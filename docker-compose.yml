services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://${DB_USER:-oneflash}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-oneflash}
    ports:
      - "${PORT:-3000}:3000"
    restart: always
    init: true
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-oneflash}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-oneflash}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-oneflash} -d ${DB_NAME:-oneflash}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
